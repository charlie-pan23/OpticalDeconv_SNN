# ==========================================
# OpticalDeconv SNN 全局配置文件
# ==========================================

# 1. 训练与数据集超参数
training:
  batch_size: 16
  epochs: 10
  learning_rate: 0.001
  time_window_us: 30000       # Tonic 切片时间窗 (30ms)
  sensor_size: [128, 128, 2]  # DVS128 分辨率与极性
  num_classes: 11

# 2. 核心网络算子配置 (基于论文，但做了显存适配)
# 注意：论文原版是 512->256，但为了能在笔记本上跑，我们训练时先按 32->16 搭建
network:
  in_channels: 32             # 原论文: 512
  out_channels: 16            # 原论文: 256
  kernel_size: 5
  stride: 2
  padding: 2
  output_padding: 1
  input_size: 8               # 8x8
  output_size: 16             # 16x16

# 3. 光子加速器物理硬件指标 (仅用于 evaluate.py 中的理论计算)
# 这些是固定的理论极值，对应论文 Table 1
hardware:
  macs: 838860800             # 乘加运算总次数
  weight_size_mb: 6.5536      # 权重占用存储 (MB)
  mrr_config: "Scaled weight-stationary" # MRR 调度策略
  num_arrays: 256             # 光子计算阵列数量
  array_size: 16              # 单个阵列大小 (16x16)
  num_adcs: 1024              # 模数转换器数量