name: snn_photonics
channels:
  - pytorch
  - nvidia
  - conda-forge
  - defaults
dependencies:
  - python=3.10

  - pytorch
  - torchvision
  - torchaudio
  - pytorch-cuda=12.1

  - numpy>=1.26.0
  - scipy>=1.12.0
  - pandas>=2.2.0
  - h5py>=3.10.0
  - scikit-learn>=1.4.0
  - scikit-image>=0.22.0

  - matplotlib>=3.8.0
  - seaborn>=0.13.0
  - tqdm>=4.66.0

  - psutil

  - jupyterlab
  - ipython
  - pytest

  - pip
  - pip:
      - snntorch>=0.9.1
      - tonic>=0.4.6
      - nvidia-ml-py
      - ptflops
      - thop
