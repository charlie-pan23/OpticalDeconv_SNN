
# HIPSA Hardware & Software Configuration for CIFAR10-DVS (Main Case Baseline)
# configs/config_cifar10dvs.yaml
# ==============================================================================

dataset:
  name: "cifar10dvs"
  root_dir: "./datasets"
  sensor_size: [128, 128]
  num_classes: 10
  time_steps: 10
  batch_size_train: 16
  batch_size: 1

network:
  type: "snn_vgg"                 # Spiking VGG network for high event density stress testing
  spike_mode: "lif"

hardware:
  num_tiles: 4                    # 4 parallel PDPU cores
  array_size: [64, 64]            # Photonic MAC scale per PDPU Tile is 64x64
  peak_parallelism: 16384         # Total peak parallelism (4 * 64 * 64 SOP/cycle)
  effective_utilization: 0.40     # Real hardware utilization considering layer mismatch, ADC scheduling, and pipeline stalls (40%)
  realized_processing_rate: 6.55  # Actual effective processing throughput (6.55 TSOP/s)
  effective_cycle_time_ns: 1.0    # System clock cycle (1 GHz)

  # Data domain and circuit bit-width precision settings
  spike_precision: 1              # Binary spike input (1-bit)
  weight_precision: 6             # Signed quantized synaptic weights (6-bit)
  membrane_precision: 16          # Fixed-point neuron membrane potential state (16-bit)
  adc_resolution: 6               # Shared resource pool low-resolution high-efficiency ADC (6-bit)

  # Physical operating mode (Eliminate timestep-level optical high-frequency switching to avoid thermal drift thresholds)
  laser_mode: "CW"                # Continuous-Wave laser source always-on mode (Continuous-Wave, not power-gated)
  mrr_mode: "locked"              # Global calibration and thermal stability locked state (Locked/Calibrated, not timestep-gated)
  adc_organization: "threshold-driven shared ADC pool" # Innovation: Hierarchical analog reduction and threshold-driven shared pool

power_model:
  # Static power components (Static Components - Always On for Thermal Stability) - Unit: mW
  cw_laser_source_mw: 300.0
  global_mrr_stabilization_mw: 350.0
  leakage_misc_io_mw: 90.0

  # Dynamic/Interface event-driven power components (Dynamic Components - Gated by Event Sparsity) - Unit: mW
  event_gated_modulator_drivers_mw: 200.0
  pd_tia_comparator_mw: 240.0
  shared_adc_pool_mw: 280.0       # Rigorously derived based on 38% average ADC trigger duty cycle (α_ADC)
  sram_register_files_mw: 210.0
  noc_bus_controller_clock_mw: 230.0

  # Total system baseline power consumption - Unit: W
  total_system_power_w: 1.90      # 1.90 W component-level itemized closed-loop summation

  evaluation:
    num_samples: 1000                     # Number of samples for evaluation (full test set is 1000)
    adc_trigger_duty_cycle: 0.38          # Consistent with the derivation of power_model.shared_adc_pool_mw
    compute_effective_utilization: true   # Whether to dynamically calculate utilization based on active_ratio
