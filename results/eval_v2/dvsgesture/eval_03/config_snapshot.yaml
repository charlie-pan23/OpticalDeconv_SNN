eval_03_args:
  dataset: dvsgesture
  config: results/dvsgesture/config_dvsgesture_acc88p54.yaml
  checkpoint: results/dvsgesture/best_dvsgesture_acc88p54.pth
  hardware: configs/hardware_hipsa.yaml
  device_params: configs/device_params.yaml
  output_root: results/eval_v2
  split: test
  batch_size: 128
  num_workers: 4
  device: auto
  max_batches: null
  thresholds:
  - 0.0
  - 0.01
  - 0.02
  - 0.05
  - 0.1
  - 0.2
  threshold_abs: 0.0
  include_fc2: false
  request_only: false
  allow_no_split: false
  non_strict: false
  hapr_group_size: null
  adc_macros: null
  modulator_activity_source: mvm_input_activity
  adc_power_mode: activity_scaled
  mrr_stabilization_mw: null
hardware:
  architecture:
    name: HIPSA
    evaluation_scope: architecture_level_model
    batch_size_for_latency: 1
    timestep_optical_power_gating: false
    cw_laser_always_on: true
    mrr_weights_configured_before_inference: true
    mrr_retuned_every_timestep: false
  photonic_tiles:
    num_tiles: 4
    logical_array_size:
    - 64
    - 64
    peak_sop_per_cycle_per_tile: 4096
    peak_sop_per_cycle_total: 16384
    effective_clock_hz: 1000000000
    effective_utilization: 0.4
    realized_active_rate_sop_per_s: 6553600000000
    realized_active_rate_tsop_per_s: 6.5536
    utilization_reason:
    - layer-size mismatch
    - ADC arbitration
    - SRAM stalls
    - inter-tile synchronization
    - NoC pressure
    - digital reduction overhead
  precision:
    spike_bits: 1
    weight_bits: 6
    adc_bits: 6
    membrane_bits: 16
    accumulation_domain: photonic_current_then_electronic_fixed_point
  hapr_adc_backend:
    hapr_group_size: 8
    tile_outputs: 64
    hapr_output_lanes_total: 32
    adc_macros: 16
    adc_organization: threshold-driven shared conventional ADC macro pool
    comparator_threshold_fs_default: 0.02
    adc_request_source: HAPR/TIA comparator trace
    adc_activity_from_trace_required: true
  memory_and_traffic:
    track_weight_sram: true
    track_membrane_sram: true
    track_event_buffers: true
    track_noc_traffic: true
    track_output_writes: true
  operation_definition:
    primary_metric: SOP
    report_efficiency_as: GOPS_per_W
    dense_equivalent_sop_computed_layerwise: true
    active_sop_computed_layerwise: true
    forbid_hardcoded_total_sop: true
  main_case_nominal_values:
    nominal_input_spike_activity: 0.15
    nominal_adc_request_activity: 0.38
    nominal_cycles_per_image: 71700
    nominal_adc_requests_per_image: 871872
  robustness_injection_points:
    mrr_static_weight_perturbation: photonic weight-bank equivalent
    laser_intensity_fluctuation: input/activation carrier amplitude before MVM
    wdm_adjacent_crosstalk: photonic accumulation output channel mixing
    adc_quantization: post-TIA pre-digital output
    comparator_threshold: HAPR/TIA comparator request decision
    tia_noise: HAPR/TIA output before ADC
  risk_reduction_rules:
    no_fixed_1p90w_final_claim: true
    no_new_adc_circuit_claim: true
    no_full_multibit_dac_for_binary_spikes: true
    no_hidden_continuous_per_ring_mrr_locking: true
    energy_efficiency_derived_from_component_power: true
device_params:
  metadata:
    unit_policy:
      power: mW unless otherwise stated
      area: um2 unless otherwise stated
      energy: pJ unless otherwise stated
    reporting_rule: derive system power from device parameter x HIPSA count x activity
      factor
    no_fixed_total_system_power: true
  optical_source:
    cw_laser:
      power_mw_main_case: 1473.0
      mode: continuous_wave
      timestep_gated: false
      notes: Use link-budget-derived laser power in the main case; do not timestep-gate
        optical carrier.
  modulation:
    binary_modulator_driver:
      power_per_active_lane_mw: 2.25
      activity_source: input spike activity trace
      precision_bits: 1
      full_multibit_dac_instantiated: false
  photodetection_frontend:
    photodiode:
      power_per_output_mw: 1.1
      area_per_output_um2: null
    tia:
      power_per_hapr_lane_mw: 3.0
      area_per_lane_um2: 50.0
    comparator:
      power_per_hapr_lane_mw: 2.2
      area_per_lane_um2: null
    hapr_selection_proxy:
      power_per_hapr_lane_mw: 0.1
      notes: Proxy for local selection/request control overhead.
  adc:
    conventional_adc_macro:
      resolution_bits_reference: 8
      power_per_macro_mw: 14.8
      sample_rate_gsps: 10
      area_per_macro_um2: 2850
      macros_main_case: 16
      activity_source: comparator request trace
      notes: Conservative conventional ADC macro for request-driven pooling; not a
        new ADC circuit claim.
  memory_digital:
    sram_register_files:
      reference_power_mw: 243.25
      activity_source: membrane/SRAM update count
    noc_bus_controller_clock:
      reference_power_mw: 77.84
      activity_source: request/output traffic trace
    digital_lif_update:
      reference_power_mw: 2.43
      activity_source: LIF update count
    leakage_misc_io:
      reference_power_mw: 90.0
      activity_source: static
  mrr_stabilization:
    main_case_power_mw: 0.0
    included_in_main_case: false
    notes: Calibrated MRR weights are configured before inference; continuous per-ring
      thermal locking is not hidden in the main result.
    stress_cases_mw:
    - 0.0
    - 100.0
    - 250.0
    - 350.0
    - 500.0
  power_model_policy:
    static_components:
    - cw_laser
    - leakage_misc_io
    activity_scaled_components:
      modulator_driver: input_spike_activity
      pd_tia_comparator: hapr_lane_count_and_frontend_policy
      adc_pool: adc_request_activity
      sram: membrane_update_activity
      noc: traffic_activity
      digital_lif: lif_update_activity
    output_fields:
    - component_power_mw
    - total_power_w
    - energy_uJ_per_image
    - throughput_images_per_s
    - efficiency_GOPS_per_W
